<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Exam Integrity Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #070710;
  --surface: #0f0f1c;
  --surface2: #181828;
  --border: #252538;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --text: #e8e8f8;
  --text2: #6b6b8f;
  --low: #00cec9;
  --med: #fdcb6e;
  --high: #ff7675;
  --glow: rgba(108,92,231,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  padding: 2.5rem 1rem 4rem;
  background-image:
    radial-gradient(ellipse 60% 40% at 70% 0%, rgba(108,92,231,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(162,155,254,0.06) 0%, transparent 60%);
}

.container { max-width: 820px; margin: auto; }

/* Header */
.header {
  text-align: center;
  margin-bottom: 2.5rem;
}
.header-badge {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent2);
  background: rgba(108,92,231,0.12);
  border: 1px solid rgba(108,92,231,0.3);
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 1rem;
  text-transform: uppercase;
}
.header h1 {
  font-size: clamp(28px, 5vw, 46px);
  font-weight: 800;
  background: linear-gradient(135deg, #fff 30%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.1;
  margin-bottom: 0.5rem;
}
.header p {
  color: var(--text2);
  font-size: 14px;
  font-family: 'IBM Plex Mono', monospace;
}

/* Cards */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.4rem;
  margin-bottom: 1rem;
  transition: border-color 0.2s;
}
.card:focus-within {
  border-color: rgba(108,92,231,0.5);
}
.card-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.card-label span { color: var(--accent2); }

input[type="password"], textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: vertical;
}
input[type="password"]:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow);
}
input[type="password"] { font-size: 14px; }
textarea { min-height: 90px; }

.student-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
@media (max-width: 600px) {
  .student-grid { grid-template-columns: 1fr; }
}
.student-slot label {
  display: block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.student-slot textarea { min-height: 120px; }

/* Button */
.btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), #9b59b6);
  border: none;
  border-radius: 14px;
  color: white;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(108,92,231,0.3);
}
.btn:hover:not(:disabled) {
  opacity: 0.9;
  box-shadow: 0 6px 32px rgba(108,92,231,0.5);
  transform: translateY(-1px);
}
.btn:active:not(:disabled) { transform: translateY(0); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}
.btn.loading .spinner { display: block; }
.btn.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  display: none;
  background: rgba(255,118,117,0.08);
  border: 1px solid rgba(255,118,117,0.3);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  margin-top: 1rem;
  color: var(--high);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
}

/* Results */
#results { display: none; margin-top: 1rem; }

.results-header {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--text2);
  text-transform: uppercase;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.risk-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 1.2rem;
}
@media (max-width: 600px) {
  .risk-grid { grid-template-columns: 1fr; }
}

.risk-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.risk-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.risk-card.low::before { background: var(--low); }
.risk-card.med::before { background: var(--med); }
.risk-card.high::before { background: var(--high); }

.r-name {
  font-size: 11px;
  font-family: 'IBM Plex Mono', monospace;
  color: var(--text2);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.r-score {
  font-size: 38px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
}
.r-level {
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  display: inline-block;
}
.risk-card.low .r-score { color: var(--low); }
.risk-card.med .r-score { color: var(--med); }
.risk-card.high .r-score { color: var(--high); }
.risk-card.low .r-level { background: rgba(0,206,201,0.1); color: var(--low); }
.risk-card.med .r-level { background: rgba(253,203,110,0.1); color: var(--med); }
.risk-card.high .r-level { background: rgba(255,118,117,0.1); color: var(--high); }

.r-reasons {
  font-size: 11px;
  color: var(--text2);
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1.6;
  text-align: left;
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}

.summary-box {
  background: rgba(108,92,231,0.08);
  border: 1px solid rgba(108,92,231,0.2);
  border-radius: 12px;
  padding: 1.2rem;
}
.summary-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent2);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.summary-text {
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
}

/* API info note */
.api-note {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  margin-top: 0.5rem;
  text-align: center;
}
.api-note a { color: var(--accent2); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-badge">✦ AI-Powered</div>
    <h1>Exam Integrity<br>Analyzer</h1>
    <p>// detects academic dishonesty patterns</p>
  </div>

  <div class="card">
    <div class="card-label"><span>⬡</span> Anthropic API Key</div>
    <input id="apiKey" type="password" placeholder="sk-ant-api03-..." autocomplete="off" />
    <p class="api-note">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  </div>

  <div class="card">
    <div class="card-label"><span>⬡</span> Exam Question</div>
    <textarea id="question" placeholder="Paste the exam question here (optional but helps accuracy)..." style="min-height:70px"></textarea>
  </div>

  <div class="card">
    <div class="card-label"><span>⬡</span> Student Answers</div>
    <div class="student-grid">
      <div class="student-slot">
        <label>STUDENT A</label>
        <textarea id="s1" placeholder="Paste answer here..."></textarea>
      </div>
      <div class="student-slot">
        <label>STUDENT B</label>
        <textarea id="s2" placeholder="Paste answer here..."></textarea>
      </div>
      <div class="student-slot">
        <label>STUDENT C</label>
        <textarea id="s3" placeholder="Paste answer here..."></textarea>
      </div>
    </div>
  </div>

  <button class="btn" id="analyzeBtn" onclick="runAnalysis()">
    <span class="btn-text">⬡ &nbsp;Analyze Integrity</span>
    <div class="spinner"></div>
  </button>

  <div class="error-box" id="errorBox"></div>

  <div id="results" class="card">
    <div class="results-header">// analysis complete</div>
    <div class="risk-grid" id="riskGrid"></div>
    <div class="summary-box">
      <div class="summary-label">Overall Summary</div>
      <div class="summary-text" id="summaryText"></div>
    </div>
  </div>

</div>

<script>
async function runAnalysis() {
  const apiKey = document.getElementById("apiKey").value.trim();
  const question = document.getElementById("question").value.trim();
  const s1 = document.getElementById("s1").value.trim();
  const s2 = document.getElementById("s2").value.trim();
  const s3 = document.getElementById("s3").value.trim();

  const errorBox = document.getElementById("errorBox");
  const btn = document.getElementById("analyzeBtn");
  errorBox.style.display = "none";

  // Validation
  if (!apiKey) return showError("Please enter your Anthropic API key.");
  if (!s1 || !s2 || !s3) return showError("Please fill in all three student answers.");

  // Loading state
  btn.disabled = true;
  btn.classList.add("loading");

  const prompt = `You are an academic integrity expert. Analyze the following student answers for signs of academic dishonesty such as plagiarism, answer sharing, or AI-generated content.

Exam Question: ${question || "Not provided"}

Student A Answer:
${s1}

Student B Answer:
${s2}

Student C Answer:
${s3}

Analyze each student's answer and return ONLY valid JSON with no extra text, no markdown, no code fences:
{
  "students": [
    {"name": "Student A", "riskScore": 0-100, "riskLevel": "low", "reasons": "brief explanation"},
    {"name": "Student B", "riskScore": 0-100, "riskLevel": "medium", "reasons": "brief explanation"},
    {"name": "Student C", "riskScore": 0-100, "riskLevel": "high", "reasons": "brief explanation"}
  ],
  "overallSummary": "Overall assessment of the group"
}

riskLevel must be exactly "low", "medium", or "high".`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const msg = errData?.error?.message || `HTTP ${res.status}`;
      throw new Error(msg);
    }

    const data = await res.json();
    const text = data.content[0].text.trim();

    // Strip markdown fences if any
    const clean = text.replace(/```json|```/g, "").trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch (e) {
      throw new Error("Could not parse response. Raw: " + text.substring(0, 200));
    }

    render(parsed);

  } catch (err) {
    showError("Error: " + err.message);
  } finally {
    btn.disabled = false;
    btn.classList.remove("loading");
  }
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = "⚠ " + msg;
  box.style.display = "block";
}

function getRiskClass(level) {
  if (!level) return "low";
  const l = level.toLowerCase();
  if (l === "high") return "high";
  if (l === "medium" || l === "med") return "med";
  return "low";
}

function render(data) {
  const grid = document.getElementById("riskGrid");
  const summaryText = document.getElementById("summaryText");
  const results = document.getElementById("results");

  grid.innerHTML = data.students.map(s => {
    const cls = getRiskClass(s.riskLevel);
    return `
      <div class="risk-card ${cls}">
        <div class="r-name">${s.name}</div>
        <div class="r-score">${s.riskScore}</div>
        <div class="r-level">${s.riskLevel || "low"}</div>
        <div class="r-reasons">${s.reasons}</div>
      </div>
    `;
  }).join("");

  summaryText.textContent = data.overallSummary;
  results.style.display = "block";
  results.scrollIntoView({ behavior: "smooth", block: "start" });
}
</script>
</body>
</html>
