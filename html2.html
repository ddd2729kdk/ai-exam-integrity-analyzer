<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Exam Integrity Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a38;
  --accent:#7c6aff;
  --text:#f0f0f8;
  --text2:#8888aa;
  --low:#6affb8;
  --med:#ffc96a;
  --high:#ff6a6a;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans';padding:2rem 1rem;}
.container{max-width:800px;margin:auto;}

.header{text-align:center;margin-bottom:2rem;}
.header h1{font-size:36px;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.card{background:var(--surface);border:1px solid var(--border);padding:1.2rem;border-radius:14px;margin-bottom:1rem;}
.card-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-family:'Space Mono';}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--surface2);
color:white;
}

button{
width:100%;
padding:14px;
background:var(--accent);
border:none;
border-radius:12px;
color:white;
font-weight:600;
cursor:pointer;
}

.risk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1rem;}
.risk-card{background:var(--surface2);padding:1rem;border-radius:10px;text-align:center;}
.r-score{font-size:24px;font-weight:700;}
.low{color:var(--low);}
.med{color:var(--med);}
.high{color:var(--high);}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h1>Exam Integrity Analyzer</h1>
<p>AI detects cheating patterns using Groq</p>
</div>

<div class="card">
<div class="card-label">🔑 Groq API Key</div>
<input id="apiKey" type="password" placeholder="gsk_..." />
</div>

<div class="card">
<div class="card-label">Question</div>
<textarea id="question"></textarea>
</div>

<div class="card">
<div class="card-label">Student Answers</div>
<textarea id="s1" placeholder="Student A"></textarea><br><br>
<textarea id="s2" placeholder="Student B"></textarea><br><br>
<textarea id="s3" placeholder="Student C"></textarea>
</div>

<button onclick="runAnalysis()">Analyze</button>

<div id="results" class="card" style="display:none;margin-top:1rem;"></div>

</div>

<script>
async function runAnalysis() {
  const apiKey = document.getElementById("apiKey").value.trim();
  const question = document.getElementById("question").value.trim();
  const s1 = document.getElementById("s1").value.trim();
  const s2 = document.getElementById("s2").value.trim();
  const s3 = document.getElementById("s3").value.trim();

  if (!apiKey) return alert("Enter Groq API key");
  if (!s1  !s2  !s3) return alert("Fill all answers");

  const prompt = `
Analyze cheating risk.

Question: ${question || "N/A"}

Student A: ${s1}
Student B: ${s2}
Student C: ${s3}

Return ONLY JSON:
{
 "students":[
  {"name":"Student A","riskScore":0-100,"riskLevel":"low|medium|high","reasons":"..."},
  {"name":"Student B","riskScore":0-100,"riskLevel":"...","reasons":"..."},
  {"name":"Student C","riskScore":0-100,"riskLevel":"...","reasons":"..."}
 ],
 "overallSummary":"..."
}
`;

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": Bearer ${apiKey}
    },
    body: JSON.stringify({
      model: "llama-3.1-70b-versatile",
      messages: [{ role: "user", content: prompt }],
      temperature: 0.2
    })
  });

  const data = await res.json();

  if (!data.choices) {
    console.log(data);
    alert("API Error");
    return;
  }

  const text = data.choices[0].message.content;

  let parsed;
  try {
    parsed = JSON.parse(text);
  } catch (e) {
    alert("JSON parse error");
    console.log(text);
    return;
  }

  render(parsed);
}
function render(data) {
  const box = document.getElementById("results");
  box.style.display = "block";

  box.innerHTML = `
  <h3>Results</h3>
  ${data.students.map(s => `
    <div class="risk-card">
      <div>${s.name}</div>
      <div class="r-score ${s.riskLevel}">${s.riskScore}%</div>
      <p>${s.reasons}</p>
    </div>
  `).join("")}
  <br>
  <b>Summary:</b> ${data.overallSummary}
  `;
}
</script>

</body>
</html>
